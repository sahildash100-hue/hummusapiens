server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache built assets aggressively (hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — every route serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
