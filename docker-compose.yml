# One-command deploy:  docker compose up -d --build
#
# Put real Razorpay credentials in server/.env first (TEST for staging,
# LIVE only on the production host). The web image bakes VITE_API_BASE at
# build time — set it to the PUBLIC URL of the api service in production.

services:
  api:
    build: ./server
    env_file: ./server/.env
    environment:
      # Allow the web container's public origin to call the API.
      ALLOWED_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
    ports:
      - "8787:8787"
    volumes:
      # Persist orders.json across restarts/redeploys.
      - order-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      args:
        VITE_API_BASE: ${PUBLIC_API_BASE:-http://localhost:8787}
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  order-data:
