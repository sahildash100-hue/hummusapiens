# Render Blueprint. In Render: New → Blueprint → pick this repo.
# Render injects PORT automatically; the API listens on it.
# Secrets are marked sync:false → Render prompts you for them (never in Git).
#
# NOTE: the API uses a persistent disk so orders.json / stock.json survive
# restarts and deploys. Disks require a paid instance (Starter). The static
# site is free.

services:
  - type: web
    name: hummusapiens-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: hummusapiens-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      # Set after the static site exists (its public URL), for CORS:
      - key: ALLOWED_ORIGIN
        sync: false
      # Razorpay LIVE credentials (Dashboard → Settings → API Keys / Webhooks):
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # Long random string; enables /admin + admin APIs:
      - key: ADMIN_TOKEN
        sync: false
      # Optional order-confirmation emails (leave unset to skip):
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: OWNER_EMAIL
        sync: false

  - type: web
    name: hummusapiens-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Set to the API service's public URL (e.g. https://hummusapiens-api.onrender.com)
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
