# Render Blueprint. In Render: New → Blueprint → pick this repo.
# Render injects PORT automatically; the API listens on it.
# Secrets are marked sync:false → Render prompts you for them (never in Git).
#
# >>> FREE TEST CONFIG <<<
# Both services run on Render's FREE plan. Caveats while testing:
#   - the API spins down after ~15 min idle (first request is slow), and
#   - it has NO persistent disk, so orders.json / stock.json RESET on every
#     restart/redeploy. That's fine for testing the flow.
# Use Razorpay TEST keys here. Before a real launch see DEPLOY.md
# "Phase B" — switch the API to plan: starter and add the disk block.

services:
  - type: web
    name: hummusapiens-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # Set after the static site exists (its public URL), for CORS:
      - key: ALLOWED_ORIGIN
        sync: false
      # Razorpay TEST credentials for this phase (rzp_test_…):
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # Long random string; enables /admin + admin APIs:
      - key: ADMIN_TOKEN
        sync: false
      # Optional order-confirmation emails (leave unset to skip):
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: OWNER_EMAIL
        sync: false

  - type: web
    name: hummusapiens-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      # Set to the API service's public URL (e.g. https://hummusapiens-api.onrender.com)
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
